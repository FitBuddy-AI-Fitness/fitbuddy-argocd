environment: production
image:
  repository: aravindacr.azurecr.io/fitbuddy-yolo-exercise-service
  tag: v1.0.0
service:
  port: 8000
replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

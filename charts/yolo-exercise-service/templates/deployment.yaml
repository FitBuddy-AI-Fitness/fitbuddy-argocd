apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitbuddy-yolo-exercise-service
  labels:
    app: fitbuddy-yolo-exercise-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: fitbuddy-yolo-exercise-service
  template:
    metadata:
      labels:
        app: fitbuddy-yolo-exercise-service
        {{- if and .Values.workloadIdentity .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: fitbuddy-sa
      containers:
        - name: yolo-exercise-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          envFrom:
            - configMapRef:
                name: fitbuddy-config-yolo-exercise-service
            - secretRef:
                name: bodygpt-secrets
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "app"
          effect: "NoSchedule"
      nodeSelector:
        agentpool: user
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "fitbuddy-akv-spc-{{ .Chart.Name }}"

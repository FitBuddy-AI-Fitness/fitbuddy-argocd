apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitbuddy-yolo-exercise-service
  labels:
    app: fitbuddy-yolo-exercise-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: fitbuddy-yolo-exercise-service
  template:
    metadata:
      labels:
        app: fitbuddy-yolo-exercise-service
        {{- if .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: fitbuddy-sa-yolo-exercise-service
      containers:
        - name: yolo-exercise-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          envFrom:
            - configMapRef:
                name: fitbuddy-config-yolo-exercise-service
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5


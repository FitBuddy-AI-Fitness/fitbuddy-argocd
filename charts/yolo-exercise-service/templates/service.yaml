apiVersion: v1
kind: Service
metadata:
  name: yolo-exercise-service
  labels:
    app: fitbuddy-yolo-exercise-service
spec:
  type: ClusterIP
  selector:
    app: fitbuddy-yolo-exercise-service
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}

environment: dev
image:
  repository: acrfitbuddyprod.azurecr.io/progress-service
  tag: 874e1a7
service:
  port: 5006
replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75
resources:
  requests:
    cpu: "25m"
    memory: "64Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"
workloadIdentity:
  enabled: true
  clientId: "YOUR-AZURE-MANAGED-IDENTITY-CLIENT-ID"
  tenantId: "YOUR-AZURE-TENANT-ID-HERE"

keyVaultName: "YOUR-KEY-VAULT-NAME-HERE"

apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: fitbuddy-routes
spec:
  parentRefs:
    - name: fitbuddy-gateway
  hostnames:
    - {{ .Values.host | quote }}
  rules:    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: fitbuddy-auth-service
          port: 80    - matches:
        - path:
            type: PathPrefix
            value: /chatbot
      backendRefs:
        - name: fitbuddy-chatbot-service
          port: 80    - matches:
        - path:
            type: PathPrefix
            value: /diet
      backendRefs:
        - name: fitbuddy-diet-service
          port: 80    - matches:
        - path:
            type: PathPrefix
            value: /progress
      backendRefs:
        - name: fitbuddy-progress-service
          port: 80    - matches:
        - path:
            type: PathPrefix
            value: /user
      backendRefs:
        - name: fitbuddy-user-service
          port: 80    - matches:
        - path:
            type: PathPrefix
            value: /workout
      backendRefs:
        - name: fitbuddy-workout-service
          port: 80    - matches:
        - path:
            type: PathPrefix
            value: /yolo
      backendRefs:
        - name: fitbuddy-yolo-exercise-service
          port: 80    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: fitbuddy-frontend
          port: 80

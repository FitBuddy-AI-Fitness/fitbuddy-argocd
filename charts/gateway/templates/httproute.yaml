apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: fitbuddy-routes

spec:
  parentRefs:
    - name: fitbuddy-gateway

  #hostnames:
    #- {{ .Values.host | quote }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: auth-service
          port: 5001

    - matches:
        - path:
            type: PathPrefix
            value: /chatbot
      backendRefs:
        - name: chatbot-service
          port: 5005

    - matches:
        - path:
            type: PathPrefix
            value: /diet
      backendRefs:
        - name: diet-service
          port: 5003

    - matches:
        - path:
            type: PathPrefix
            value: /progress
      backendRefs:
        - name: progress-service
          port: 5006

    - matches:
        - path:
            type: PathPrefix
            value: /user
      backendRefs:
        - name: user-service
          port: 5002

    - matches:
        - path:
            type: PathPrefix
            value: /workout
      backendRefs:
        - name: workout-service
          port: 5004

    - matches:
        - path:
            type: PathPrefix
            value: /yolo
      backendRefs:
        - name: yolo-exercise-service
          port: 8001

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: fitbuddy-frontend
          port: 80

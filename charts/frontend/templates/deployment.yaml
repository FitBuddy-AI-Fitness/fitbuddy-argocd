apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitbuddy-frontend
  labels:
    app: fitbuddy-frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: fitbuddy-frontend
  template:
    metadata:
      labels:
        app: fitbuddy-frontend
        {{- if and .Values.workloadIdentity .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: fitbuddy-sa
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          envFrom:
            - configMapRef:
                name: fitbuddy-config-frontend
            - secretRef:
                name: bodygpt-secrets
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5



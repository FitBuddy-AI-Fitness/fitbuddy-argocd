environment: dev

image:
  repository: aravindacr.azurecr.io/fitbuddy-workout-service
  tag: latest

service:
  port: 3006

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"


